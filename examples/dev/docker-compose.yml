# Local Development: Builds sercha from source
# Usage: docker compose up -d
# UI: Run separately with `cd ui && npm run dev` (port 3000)

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sercha
      POSTGRES_PASSWORD: sercha_dev
      POSTGRES_DB: sercha
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sercha -d sercha"]
      interval: 5s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=admin
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  sercha:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://sercha:sercha_dev@postgres:5432/sercha?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      MASTER_KEY: ${MASTER_KEY}
      PORT: 8080
      UI_BASE_URL: http://localhost:3000
      CORS_ORIGINS: "*"  # Permissive for local dev (MCP Inspector, etc.)
      OPENSEARCH_URL: http://opensearch:9200
      PGVECTOR_URL: postgres://sercha:sercha_dev@postgres:5432/sercha?sslmode=disable
      PGVECTOR_DIMENSIONS: "1536"
      LOCALFS_ALLOWED_ROOTS: /data
      # MCP OAuth server
      MCP_ENABLED: "true"
      MCP_SERVER_URL: http://localhost:8080/mcp
      # Optional: Configure AI providers
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Optional: Configure OAuth providers
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      NOTION_CLIENT_ID: ${NOTION_CLIENT_ID:-}
      NOTION_CLIENT_SECRET: ${NOTION_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
    volumes:
      - ./test-docs:/data/test-docs:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy

volumes:
  postgres_data:
  opensearch_data:
