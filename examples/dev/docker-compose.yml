# Local Development: Builds from source, identical to quickstart otherwise
# Usage:
#   API only:      docker compose up -d
#   With UI:       docker compose --profile ui up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sercha
      POSTGRES_PASSWORD: sercha_dev
      POSTGRES_DB: sercha
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sercha -d sercha"]
      interval: 5s
      timeout: 5s
      retries: 5

  vespa:
    image: vespaengine/vespa:8
    ports:
      - "19071:19071"
    volumes:
      - vespa_data:/opt/vespa/var
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19071/state/v1/health"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s

  sercha:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://sercha:sercha_dev@postgres:5432/sercha?sslmode=disable
      VESPA_CONFIG_URL: http://vespa:19071
      VESPA_CONTAINER_URL: http://vespa:8080
      JWT_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      MASTER_KEY: fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210
      PORT: 8080
      UI_BASE_URL: http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      LOCALFS_ALLOWED_ROOTS: /data
      # Optional: Configure AI providers for testing
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Optional: Configure OAuth providers for testing
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    volumes:
      - ./test-docs:/data/test-docs:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      vespa:
        condition: service_healthy

  ui-build:
    profiles: ["ui"]
    build:
      context: ../../ui
      dockerfile: Dockerfile
      target: builder
      args:
        NEXT_PUBLIC_API_URL: ""
    volumes:
      - ui_static:/output

  nginx:
    profiles: ["ui"]
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx-ui.conf:/etc/nginx/nginx.conf:ro
      - ui_static:/usr/share/nginx/html:ro
    depends_on:
      ui-build:
        condition: service_completed_successfully
      sercha:
        condition: service_healthy

volumes:
  postgres_data:
  vespa_data:
  ui_static:
