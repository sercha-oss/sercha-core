# Local Development: Builds sercha from source
# Usage: docker compose up -d
# UI: Run separately with `cd ui && npm run dev` (port 3001)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sercha
      POSTGRES_PASSWORD: sercha_dev
      POSTGRES_DB: sercha
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sercha -d sercha"]
      interval: 5s
      timeout: 5s
      retries: 5

  sercha:
    build:
      context: ../..
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://sercha:sercha_dev@postgres:5432/sercha?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      MASTER_KEY: ${MASTER_KEY}
      PORT: 8080
      UI_BASE_URL: http://localhost:3001
      CORS_ALLOWED_ORIGINS: http://localhost:3001
      LOCALFS_ALLOWED_ROOTS: /data
      # Optional: Configure AI providers
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Optional: Configure OAuth providers
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    volumes:
      - ./test-docs:/data/test-docs:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
