<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src data:; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'" />
<title>Sercha Search Results</title>
<style>
  :root {
    --sercha-snow: #fafafa;
    --sercha-mist: #ececec;
    --sercha-silverline: #c7c8cc;
    --sercha-ink-slate: #333f50;
    --sercha-fog-grey: #7b8088;
    --sercha-indigo: #6675ff;
    --sercha-indigo-soft: #e2e5ff;
  }
  * { box-sizing: border-box; }
  html { min-height: 100%; background: var(--sercha-snow); }
  body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    color: var(--sercha-ink-slate);
    background: var(--sercha-snow);
  }
  .wrap {
    max-width: 100%;
    padding: 14px 16px 12px;
    border: 1px solid var(--sercha-mist);
    background: var(--sercha-snow);
  }
  .hdr {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    color: var(--sercha-fog-grey);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .hdr .brand {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--sercha-ink-slate);
    font-weight: 600;
    font-size: 12px;
  }
  .hdr .brand svg { width: 18px; height: 18px; }
  .hdr .count { margin-left: auto; }
  .list {
    display: flex;
    flex-direction: column;
    border-top: 1px solid var(--sercha-mist);
  }
  .row {
    display: grid;
    grid-template-columns: 20px 1fr auto;
    grid-column-gap: 10px;
    align-items: center;
    padding: 8px 4px;
    border-bottom: 1px solid var(--sercha-mist);
    background: transparent;
    cursor: pointer;
    transition: background 120ms ease;
    text-align: left;
    width: 100%;
    font: inherit;
    color: inherit;
    border-left: none;
    border-right: none;
    border-top: none;
  }
  .row:hover:not(:disabled) { background: var(--sercha-indigo-soft); }
  .row:active:not(:disabled) { background: rgba(102, 117, 255, 0.18); }
  .row:disabled { cursor: progress; opacity: 0.75; }
  .row .icon {
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .row .icon img { width: 18px; height: 18px; object-fit: contain; }
  .row .icon .fallback {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px;
    font-weight: 600; color: var(--sercha-indigo);
    background: var(--sercha-indigo-soft);
    font-size: 10px;
  }
  .row .title {
    font-weight: 500;
    color: var(--sercha-ink-slate);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    line-height: 1.35;
  }
  .row .score {
    font-size: 11px;
    color: var(--sercha-fog-grey);
    font-variant-numeric: tabular-nums;
    padding-left: 8px;
  }
  .empty, .debug {
    padding: 14px;
    text-align: center;
    color: var(--sercha-fog-grey);
    border: 1px dashed var(--sercha-silverline);
    border-radius: 8px;
    background: #fff;
    font-size: 12px;
  }
  .err {
    padding: 10px 12px;
    color: #a33;
    border: 1px solid #f3c2c2;
    background: #fff4f4;
    border-radius: 8px;
    font-size: 12px;
    margin-top: 8px;
  }
  @media (prefers-color-scheme: dark) {
    html { background: #181b22; }
    body { color: #e5e7ec; background: #181b22; }
    .wrap {
      background: #181b22;
      border-color: #2f3442;
    }
    .hdr .brand { color: #e5e7ec; }
    .list { border-top-color: #2f3442; }
    .row {
      border-bottom-color: #2f3442;
      color: #e5e7ec;
    }
    .row:hover:not(:disabled) { background: rgba(102, 117, 255, 0.12); }
    .row:active:not(:disabled) { background: rgba(102, 117, 255, 0.22); }
    .row .title { color: #f4f5f8; }
    .row .score, .hdr { color: #aeb3be; }
    .empty, .debug {
      background: #20242d;
      border-color: #353a48;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <span class="brand">
      <svg viewBox="900 490 180 180" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <g fill="#6675ff">
          <path d="M1003.81,544.99c7.19,1.01,13.3,5.33,16.77,11.38h8.34c-4.15-10.25-13.69-17.73-25.11-18.93V544.99z"/>
          <path d="M1070.17,587.54l-32.86,0c-3.38,6.58-8.47,12.13-14.69,16.07c-0.04,0.02-0.07,0.04-0.11,0.06l6.29,11.87 l5.51-2.92l7.6,14.35c0.99-0.65,2-1.32,3.02-2.04C1056.94,615.59,1065.92,602.56,1070.17,587.54z"/>
          <path d="M1018.54,620.97l-6.68-12.61c-0.51,0.14-1.01,0.31-1.53,0.44c-2.63,0.64-5.35,1.02-8.14,1.13 c-0.53,0.02-1.07,0.06-1.61,0.06c-22.78,0-41.25-18.47-41.25-41.25s18.47-41.25,41.25-41.25c16.74,0,31.14,9.98,37.61,24.3h32.91 c-7.3-32.22-36.09-56.28-70.51-56.28c-39.94,0-72.32,32.38-72.32,72.32c0,39.94,32.38,72.32,72.32,72.32 c3.92,0,7.77-0.32,11.52-0.92c0,0,3-0.23,8.09-1.78l-7.17-13.54L1018.54,620.97z"/>
        </g>
      </svg>
      Sercha
    </span>
    <span id="count" class="count"></span>
  </div>
  <div id="list" class="list"></div>
  <div id="err" class="err" style="display:none"></div>
</div>
<script>
(() => {
  'use strict';

  // Provider icon data URIs, injected server-side. Keys are exact
  // domain.ProviderType string values; no aliases, no normalisation.
  const ICONS = {
    __ICONS__
  };

  function iconFor(providerType) {
    return (providerType && ICONS[providerType]) || null;
  }

  function fallbackLetter(providerType, sourceId) {
    const s = providerType || sourceId || '';
    const c = s.charAt(0).toUpperCase();
    return /[A-Z0-9]/.test(c) ? c : '?';
  }

  // ===== MCP Apps PostMessageTransport =====
  //
  // Wire contract (spec 2026-01-26):
  //  1. Iframe sends `ui/initialize` REQUEST to parent.
  //  2. Host responds with { protocolVersion, hostCapabilities, hostInfo, hostContext }.
  //  3. Iframe sends `ui/notifications/initialized` notification.
  //  4. Host then begins pushing `ui/notifications/tool-result` etc.
  //
  // Until step 3 lands, Claude sends no messages — which means a blank
  // widget. That was the bug in the first pass.

  const PROTOCOL_VERSION = '2026-01-26';
  let nextId = 1;
  const pending = new Map();
  let initialized = false;
  let pendingToolResult = null;

  function send(msg) {
    try {
      window.parent.postMessage(msg, '*');
    } catch (e) {
      console.error('sercha-widget: postMessage failed', e);
    }
  }

  function rpc(method, params) {
    const id = nextId++;
    return new Promise((resolve, reject) => {
      pending.set(id, { resolve, reject });
      send({ jsonrpc: '2.0', id, method, params: params || {} });
    });
  }

  function notify(method, params) {
    send({ jsonrpc: '2.0', method, params: params || {} });
  }

  window.addEventListener('message', (ev) => {
    const data = ev.data;
    if (!data || typeof data !== 'object' || data.jsonrpc !== '2.0') return;

    // Response to a request we sent.
    if (data.id != null && pending.has(data.id)) {
      const { resolve, reject } = pending.get(data.id);
      pending.delete(data.id);
      if (data.error) reject(new Error(data.error.message || 'rpc error'));
      else resolve(data.result);
      return;
    }

    // Host → iframe notifications.
    if (!data.method) return;
    switch (data.method) {
      case 'ui/notifications/tool-result':
        onToolResult(data.params || {});
        break;
      case 'ui/notifications/tool-input':
      case 'ui/notifications/tool-input-partial':
        // We don't need the raw inputs for rendering.
        break;
      case 'ui/notifications/tool-cancelled':
        renderError('Search was cancelled.');
        break;
      default:
        // Unknown notification; ignore.
        break;
    }
  });

  async function handshake() {
    // Claude's ui/initialize validator requires `appInfo` (not `clientInfo`
    // from the published spec). Send both keys + appCapabilities for
    // belt-and-braces compatibility with hosts that follow the spec literally.
    const appInfo = { name: 'sercha-search-widget', version: '0.1.0' };
    const caps = {
      // Capability declarations — hosts only honor features we ask for.
      openLinks: {},
    };
    try {
      const result = await rpc('ui/initialize', {
        protocolVersion: PROTOCOL_VERSION,
        appInfo: appInfo,
        clientInfo: appInfo,
        capabilities: caps,
        appCapabilities: caps,
      });
      void result;
    } catch (e) {
      renderError('Widget failed to initialize: ' + (e && e.message ? e.message : 'unknown'));
      return;
    }
    notify('ui/notifications/initialized', {});
    initialized = true;
    startSizeObserver();
    if (pendingToolResult) {
      const p = pendingToolResult;
      pendingToolResult = null;
      onToolResult(p);
    }
  }

  // Size change notifications — height only. Reporting width creates a
  // feedback loop: the host narrows the iframe, we measure narrow content,
  // we ask for narrow width, host narrows further. Let the host pick width
  // (full chat column in inline mode) and only grow vertically.
  let lastH = 0, sizePending = false;
  function measureHeight() {
    const wrap = document.querySelector('.wrap');
    if (!wrap) return Math.ceil(document.documentElement.scrollHeight);
    return Math.ceil(wrap.getBoundingClientRect().height);
  }
  function notifySize() {
    const h = measureHeight();
    if (h <= 0 || h === lastH) return;
    lastH = h;
    notify('ui/notifications/size-changed', { height: h });
  }
  function scheduleSize() {
    if (sizePending) return;
    sizePending = true;
    requestAnimationFrame(() => { sizePending = false; notifySize(); });
  }
  function startSizeObserver() {
    scheduleSize();
    try {
      const ro = new ResizeObserver(scheduleSize);
      const wrap = document.querySelector('.wrap');
      if (wrap) ro.observe(wrap);
      ro.observe(document.body);
    } catch (_) {
      // ResizeObserver unavailable — fall back to mutation-based polling.
      new MutationObserver(scheduleSize).observe(document.body, {
        subtree: true, childList: true, characterData: true, attributes: true,
      });
    }
  }

  function onToolResult(params) {
    if (!initialized) {
      // Shouldn't happen per spec (host waits for initialized), but defend.
      pendingToolResult = params;
      return;
    }
    let results = null;
    if (params && params.structuredContent && Array.isArray(params.structuredContent.results)) {
      results = params.structuredContent.results;
    }
    render(results);
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function renderError(msg) {
    const errEl = document.getElementById('err');
    errEl.textContent = msg;
    errEl.style.display = 'block';
  }

  function render(results) {
    const list = document.getElementById('list');
    const count = document.getElementById('count');
    list.innerHTML = '';

    if (!results) {
      // Don't render a "Waiting…" placeholder — keep the widget compact
      // during the handshake so the iframe doesn't get stuck at Claude's
      // default height.
      count.textContent = '';
      return;
    }
    if (results.length === 0) {
      count.textContent = '';
      list.innerHTML = '<div class="empty">No matches.</div>';
      return;
    }

    count.textContent = results.length + ' result' + (results.length === 1 ? '' : 's');

    for (const r of results) {
      const icon = iconFor(r.provider_type);
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'row';
      btn.innerHTML =
        '<span class="icon">' +
          (icon
            ? '<img src="' + icon + '" alt="" />'
            : '<span class="fallback">' + escapeHtml(fallbackLetter(r.provider_type, r.source_id)) + '</span>'
          ) +
        '</span>' +
        '<span class="title">' + escapeHtml(r.title || r.document_id) + '</span>' +
        '<span class="score">' + (typeof r.score === 'number' ? r.score.toFixed(0) : '') + '</span>';
      btn.addEventListener('click', () => openResult(btn, r.document_id));
      list.appendChild(btn);
    }
  }

  // Click flow: invoke get_document via the host so the server observes the
  // click (audit/observability), read the URL from its structured response,
  // then ask the host to open the link. The round-trip is intentional —
  // do not short-circuit by putting URLs on SearchResult.
  async function openResult(btn, documentId) {
    if (!documentId) return;
    btn.disabled = true;
    const errEl = document.getElementById('err');
    errEl.style.display = 'none';
    try {
      const res = await rpc('tools/call', {
        name: 'get_document',
        arguments: { document_id: documentId },
      });
      const url = res && res.structuredContent && res.structuredContent.url;
      if (!url) throw new Error('No source URL for this document');
      await rpc('ui/open-link', { url });
    } catch (e) {
      renderError('Could not open document: ' + (e && e.message ? e.message : 'unknown error'));
    } finally {
      btn.disabled = false;
    }
  }

  render(null);
  handshake();
})();
</script>
</body>
</html>
